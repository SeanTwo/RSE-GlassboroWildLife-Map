<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
      #map {
        bottom: 0;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
      }

      .leaflet-control-layers-toggle {
          width: 70px !important;
          height: 70px !important;
          background-image: url('https://static.thenounproject.com/png/3402667-200.png') !important;
          background-size: 60px 60px !important;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/sql.js@0.3.2/js/sql.js"></script>
    <script src="./Leaflet.TileLayer.MBTiles.js"></script>
    <script>
      // initalize leaflet map
      var map = L.map('map').setView([39.680884,-75.073375], 14);

      // add OpenStreetMap basemap
      var osm = L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
      });

      var gsat3 = L.tileLayer('http://mt0.google.com/vt/lyrs=s&hl=en&x={x}&y={y}&z={z}', {
          attribution: 'Google Maps Sattelite Imagers: <a href="http://osm.org/copyright">Google Maps</a>'
      }).addTo(map);

      var baseMaps = {
        "OpenStreetMap": osm,
        "Google Sattelite": gsat3
      };

      const startYear = 2015;
      const endYear = 2025;
      
      var three_class_yrs = {};
      for (var i = startYear; i <= endYear; i++) {
        var yr_imagery = L.tileLayer.mbTiles(`./GWP_3_class_${i}.mbtiles`, {
          minZoom: 1,
          maxZoom: 18
        });
        yr_imagery.bringToFront();
        three_class_yrs[`GWP 3 Classes of Fire Damage ${i}`] = yr_imagery;
        if (i === endYear) {
          yr_imagery.addTo(map);
        }
      }

      var layerControl = L.control.layers(baseMaps, three_class_yrs).addTo(map);

      map.on('layeradd', function () {
        Object.entries(three_class_yrs).forEach(([key, value]) => { value.bringToFront(); });
      });
    </script>
  </body>
</html>
