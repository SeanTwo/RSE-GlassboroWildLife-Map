<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.0.3/dist/leaflet.css"/>
    <style>
      #map {
        bottom: 0;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/proj4@2.20.8/dist/proj4-src.js"></script>
    <script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet@4.1.2/dist/v3/webpack/bundle/georaster-layer-for-leaflet.min.js"></script>
    <script>
      // initalize leaflet map
      var map = L.map('map').setView([39.680884,-75.073375], 14);

      // add OpenStreetMap basemap
      L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      var url_to_geotiff_file = "https://seantwo.github.io/RSE-GlassboroWildLife-Map/test_2025.tif";

      function determineColor(pixelValues) {
        const value = pixelValues[0];

        // treat 0 (or your nodata value) as transparent
        if (value === 0 || value === georaster.noDataValue) {
          return null; // transparent
        }
        if (value === 1) {
          return 'rgba(255, 4, 69, 1)';
        }
        if (value === 2) {
          return 'rgba(242, 255, 178, 1)';
        }
        if (value === 3) {
          return 'rgba(45, 162, 38, 1)';
        }
        else {
          return 'rgba(0, 0, 0, 0)'; // default color for other values
        }
      }

      parseGeoraster(url_to_geotiff_file).then(georaster => {
        var layer = new GeoRasterLayer({
            georaster: georaster,
            resolution: 128,
            pixelValuesToColorFn: determineColor
        });
        layer.addTo(map);

        map.fitBounds(layer.getBounds());

    });

    </script>
  </body>
</html>
