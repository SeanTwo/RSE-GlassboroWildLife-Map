<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.0.3/dist/leaflet.css"/>
    <style>
      #map {
        bottom: 0;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.0.3/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/georaster@1.6.0/dist/georaster.browserify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>
    <script>
      // initalize leaflet map
      var map = L.map('map').setView([39.680884,-75.073375], 14);

      // add OpenStreetMap basemap
      L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      var url_to_geotiff_file = "https://seantwo.github.io/RSE-GlassboroWildLife-Map/test_2025.tif";

      parseGeoraster(url_to_geotiff_file).then(georaster => {
        var layer = new GeoRasterLayer({
            georaster: georaster,
            resolution: 128,
            pixelValuesToColorFn: function(pixelValues) {
              const value = pixelValues[0];

              // treat 0 (or your nodata value) as transparent
              if (value === 0 || value === georaster.noDataValue) {
                return null; // transparent
              }

              return `rgba(${value}, ${value}, ${value}, 1)`; // basic grayscale example
            }
        });
        layer.addTo(map);

        map.fitBounds(layer.getBounds());

    });

    </script>
  </body>
</html>
